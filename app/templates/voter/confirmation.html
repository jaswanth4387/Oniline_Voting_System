<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vote Confirmed | JanVote Portal</title>

    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/confirmation.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<body>

    <!-- ===== HEADER ===== -->
    <div class="top-header">
        <div class="container d-flex justify-content-between align-items-center">

            <div class="d-flex align-items-center">
                <a href="{{ url_for('public.home') }}"><img src="{{ url_for('static', filename='images/logo.png') }}" class="main-logo"></a>
                <div class="ms-3">
                    <h4 class="portal-title">JanVote Portal</h4>
                    <small class="portal-subtitle">Online Voting Awareness & Service</small>
                </div>
            </div>

            <a href="{{ url_for('public.home') }}" class="login-btn">Home</a>
        </div>
    </div>


    <!-- ===== CONFIRMATION CARD ===== -->
    <div class="confirm-wrapper">

        <div class="confirm-card text-center">

            <div class="success-circle">
                ✓
            </div>

            <h2 class="mt-4">Your Vote Has Been Successfully Cast!</h2>

            <p class="lead mt-3">
                Thank you for participating in the democratic process.
            </p>

            <div class="vote-info mt-4">
                <p><strong>Status:</strong> Recorded Securely</p>
                <p><strong>Duplicate Voting:</strong> Not Allowed</p>
                <p><strong>Verification:</strong> OTP Verified</p>
            </div>

            <div class="mt-4">
                <a href="{{ url_for('public.home') }}" class="btn btn-primary me-3">Return Home</a>
                <a href="{{ url_for('public.results') }}" target="_blank" class="btn btn-outline-success">View Results</a>
            </div>

        </div>

    </div>


    <!-- ===== FOOTER ===== -->
    <footer>
        <div class="footer-bottom text-center">
            © 2025 JanVote Portal
        </div>
    </footer>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
