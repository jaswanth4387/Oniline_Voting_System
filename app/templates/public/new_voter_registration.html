<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        New Voter Registration
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
        }

        .registration-card{
            border:none;
            border-radius:20px;
        }

        .section-title{
            font-weight:700;
            color:#0d6efd;
            margin-top:35px;
            margin-bottom:20px;
        }

        .verified-text{
            color:green;
            font-weight:600;
            font-size:14px;
        }

        .readonly-box{
            background:#e9ecef;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-11">

            <div class="card shadow-lg registration-card p-4">

                <h2 class="text-center mb-2">

                    New Voter Registration

                </h2>

                <p class="text-center text-muted mb-4">

                    Election Commission of India

                </p>


                <form id="registrationForm"
                      method="POST"
                      enctype="multipart/form-data">


                    <!-- ================= PERSONAL DETAILS ================= -->

                    <h4 class="section-title">

                        Personal Details

                    </h4>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                First Name

                            </label>

                            <input type="text"
                                   name="first_name"
                                   class="form-control"
                                   required>

                        </div>


                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Last Name

                            </label>

                            <input type="text"
                                   name="last_name"
                                   class="form-control"
                                   required>

                        </div>

                    </div>


                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Father Name

                            </label>

                            <input type="text"
                                   name="father_name"
                                   class="form-control"
                                   required>

                        </div>


                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Mother Name

                            </label>

                            <input type="text"
                                   name="mother_name"
                                   class="form-control"
                                   required>

                        </div>

                    </div>


                    <div class="row">

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Date of Birth

                            </label>

                            <input type="date"
                                   name="dob"
                                   class="form-control"
                                   required>

                        </div>


                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Gender

                            </label>

                            <select name="gender"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select Gender
                                </option>

                                <option>
                                    Male
                                </option>

                                <option>
                                    Female
                                </option>

                                <option>
                                    Other
                                </option>

                            </select>

                        </div>


                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Caste Category

                            </label>

                            <select name="caste"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select Category
                                </option>

                                <option>
                                    General
                                </option>

                                <option>
                                    OBC
                                </option>

                                <option>
                                    SC
                                </option>

                                <option>
                                    ST
                                </option>

                                <option>
                                    EWS
                                </option>

                            </select>

                        </div>

                    </div>


                    <!-- ================= CONTACT VERIFICATION ================= -->

                    <h4 class="section-title">

                        Contact Verification

                    </h4>


                    <!-- MOBILE -->

                    <div class="row">

                        <div class="col-md-8 mb-3">

                            <label class="form-label">

                                Mobile Number

                            </label>

                            <input type="tel"
                                   id="mobile"
                                   name="mobile"
                                   maxlength="10"
                                   class="form-control"
                                   required>

                        </div>


                        <div class="col-md-4 d-flex align-items-end mb-3">

                            <button type="button"
                                    class="btn btn-primary w-100"
                                    onclick="sendMobileOTP()">

                                Send OTP

                            </button>

                        </div>

                    </div>


                    <div class="row">

                        <div class="col-md-8 mb-3">

                            <label class="form-label">

                                Enter Mobile OTP

                            </label>

                            <input type="text"
                                   id="mobile_otp"
                                   class="form-control">

                        </div>


                        <div class="col-md-4 d-flex align-items-end mb-3">

                            <button type="button"
                                    class="btn btn-success w-100"
                                    onclick="verifyMobileOTP()">

                                Verify OTP

                            </button>

                        </div>

                    </div>


                    <div id="mobile-status"
                         class="verified-text mb-3"></div>


                    <!-- EMAIL -->

                    <div class="row">

                        <div class="col-md-8 mb-3">

                            <label class="form-label">

                                Email Address

                            </label>

                            <input type="email"
                                   id="email"
                                   name="email"
                                   class="form-control"
                                   required>

                        </div>


                        <div class="col-md-4 d-flex align-items-end mb-3">

                            <button type="button"
                                    class="btn btn-primary w-100"
                                    onclick="sendEmailOTP()">

                                Send OTP

                            </button>

                        </div>

                    </div>


                    <div class="row">

                        <div class="col-md-8 mb-3">

                            <label class="form-label">

                                Enter Email OTP

                            </label>

                            <input type="text"
                                   id="email_otp"
                                   class="form-control">

                        </div>


                        <div class="col-md-4 d-flex align-items-end mb-3">

                            <button type="button"
                                    class="btn btn-success w-100"
                                    onclick="verifyEmailOTP()">

                                Verify OTP

                            </button>

                        </div>

                    </div>


                    <div id="email-status"
                         class="verified-text mb-3"></div>


                    <!-- ================= ADDRESS DETAILS ================= -->

                    <h4 class="section-title">

                        Address Details

                    </h4>


                    <div class="mb-3">

                        <label class="form-label">

                            Full Address

                        </label>

                        <textarea name="address"
                                  rows="3"
                                  class="form-control"
                                  required></textarea>

                    </div>


                    <div class="row">

                        <!-- STATE -->

                        <div class="col-md-3 mb-3">

                            <label class="form-label">

                                State

                            </label>

                            <select id="state"
                                    name="state"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select State
                                </option>

                            </select>

                        </div>


                        <!-- DISTRICT -->

                        <div class="col-md-3 mb-3">

                            <label class="form-label">

                                District

                            </label>

                            <select id="district"
                                    name="district"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select District
                                </option>

                            </select>

                        </div>


                        <!-- MANDAL -->

                        <div class="col-md-3 mb-3">

                            <label class="form-label">

                                Mandal

                            </label>

                            <select id="mandal"
                                    name="mandal"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select Mandal
                                </option>

                            </select>

                        </div>


                        <!-- VILLAGE -->

                        <div class="col-md-3 mb-3">

                            <label class="form-label">

                                Village

                            </label>

                            <select id="village"
                                    name="village"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select Village
                                </option>

                            </select>

                        </div>

                    </div>


                    <!-- CONSTITUENCIES -->

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Assembly Constituency

                            </label>

                            <input type="text"
                                   id="assembly"
                                   name="assembly"
                                   class="form-control readonly-box"
                                   readonly>

                        </div>


                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Parliament Constituency

                            </label>

                            <input type="text"
                                   id="parliament"
                                   name="parliament"
                                   class="form-control readonly-box"
                                   readonly>

                        </div>

                    </div>


                    <!-- PINCODE -->

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Pincode

                            </label>

                            <input type="text"
                                   name="pincode"
                                   maxlength="6"
                                   class="form-control"
                                   required>

                        </div>


                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Landmark

                            </label>

                            <input type="text"
                                   name="landmark"
                                   class="form-control">

                        </div>

                    </div>


                    <!-- ================= IDENTITY DETAILS ================= -->

                    <h4 class="section-title">

                        Identity Details

                    </h4>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Aadhaar Number

                            </label>

                            <input type="text"
                                   name="aadhaar"
                                   maxlength="12"
                                   class="form-control"
                                   required>

                        </div>


                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                PAN Number

                            </label>

                            <input type="text"
                                   name="pan"
                                   class="form-control">

                        </div>

                    </div>


                    <!-- ================= DOCUMENTS ================= -->

                    <h4 class="section-title">

                        Upload Documents

                    </h4>


                    <div class="mb-3">

                        <label class="form-label">

                            Government ID

                        </label>

                        <input type="file"
                               name="government_id"
                               accept=".pdf,.jpg,.jpeg,.png"
                               class="form-control"
                               required>

                    </div>


                    <div class="mb-3">

                        <label class="form-label">

                            Residential Proof

                        </label>

                        <input type="file"
                               name="address_proof"
                               accept=".pdf,.jpg,.jpeg,.png"
                               class="form-control"
                               required>

                    </div>


                    <div class="mb-3">

                        <label class="form-label">

                            Passport Size Photo

                        </label>

                        <input type="file"
                               name="photo"
                               accept=".jpg,.jpeg,.png"
                               class="form-control"
                               required>

                    </div>


                    <!-- ================= DECLARATION ================= -->

                    <div class="form-check mt-4">

                        <input class="form-check-input"
                               type="checkbox"
                               required>

                        <label class="form-check-label">

                            I hereby declare that all
                            information provided is true
                            and valid.

                        </label>

                    </div>


                    <!-- ================= SUBMIT ================= -->

                    <div class="d-grid mt-4">

                        <button class="btn btn-success btn-lg">

                            Submit Registration

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>


<!-- JS FILES -->

<script src="{{ url_for('static',
filename='js/location_dropdown.js') }}"></script>

<script src="{{ url_for('static',
filename='js/voter_registration.js') }}"></script>

</body>
</html>
