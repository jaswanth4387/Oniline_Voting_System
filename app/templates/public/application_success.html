<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Registration Successful
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
        }

        .success-card{
            max-width:700px;
            margin:auto;
            margin-top:80px;
            border:none;
            border-radius:20px;
        }

        .success-icon{
            font-size:70px;
        }

        .tracking-box{
            background:#eef5ff;
            padding:15px;
            border-radius:10px;
            font-size:22px;
            font-weight:700;
            color:#0d6efd;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card shadow-lg success-card p-5 text-center">

        <div class="success-icon mb-3">

            ✅

        </div>

        <h2 class="mb-3 text-success">

            Registration Successful

        </h2>

        <p class="text-muted">

            Your voter registration application
            has been submitted successfully.

        </p>

        <p>

            Status:
            <strong class="text-warning">

                Pending Approval

            </strong>

        </p>

        <p>

            Verification may take up to
            <strong>

                7 days

            </strong>

        </p>


        <!-- TRACKING ID -->

        <div class="tracking-box mt-4 mb-4">

            Tracking ID:
            {{ tracking_id }}

        </div>


        <a href="{{ url_for('public.home') }}"
           class="btn btn-primary">

            Back to Home

        </a>

    </div>

</div>

</body>
</html>
